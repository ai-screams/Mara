name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 셸·워크플로 린트는 macOS가 필요 없다. ubuntu는 분당 과금이 macOS의 1/10이고 shellcheck가 러너
  # 이미지에 기본 탑재라 설치가 없다. test 잡과 병렬로 돌아 Xcode 빌드를 기다리지 않고 빨리 실패한다.
  lint:
    name: Lint (shell & workflows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: ShellCheck (bash scripts)
        run: |
          # 대상은 셔뱅으로 **자동 탐색**한다 — 목록을 하드코딩하면 새로 추가된 스크립트가 조용히
          # 빠져 "가드가 아무것도 검사 안 하면서 초록"이 된다. zsh 스크립트(release.sh·
          # generate-project.sh)는 shellcheck가 지원하지 않아 자연히 제외되고, 문법 검사는 test 잡의
          # `zsh -n`이 담당한다.
          command -v shellcheck >/dev/null \
            || { echo "::error::shellcheck not found on runner image"; exit 1; }
          shellcheck --version | sed -n '2p'
          files="$(grep -rl '^#!.*bash' scripts .github || true)"
          [ -n "$files" ] || { echo "::error::bash script discovery found nothing — the guard would check nothing"; exit 1; }
          echo "$files"
          echo "$files" | xargs shellcheck

      - name: actionlint (pinned, checksum-verified)
        env:
          # install-xcodegen.sh와 같은 이유로 핀+체크섬: 버전 드리프트로 무관한 PR에서 CI가 깨지거나
          # 배포 아티팩트가 바뀌는 것을 막는다. 버전 올릴 때 두 값을 함께 교체
          # (체크섬 출처: 릴리스의 actionlint_<ver>_checksums.txt).
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o "$RUNNER_TEMP/actionlint.tar.gz" "$url"
          echo "${ACTIONLINT_SHA256}  $RUNNER_TEMP/actionlint.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/actionlint.tar.gz" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -version
          "$RUNNER_TEMP/actionlint" .github/workflows/*.yml

  test:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Sponsor link parity
        # 후원 URL이 App·README·랜딩·FUNDING 네 곳에서 갈라지지 않게 고정(핸들만 바꾸고 표면 놓치면 404). 빠른 fail.
        # --selftest는 가드 자체를 fixture로 검증한다 — 이 검사는 도입 당시 `/typo` 접미사를 조용히
        # 통과시켰다. 가드가 아무것도 안 잡으면서 초록인 상태를 막는다.
        run: |
          scripts/check-sponsor-links.sh --selftest
          scripts/check-sponsor-links.sh

      - name: Release version grammar selftest
        # release.sh와 release.yml appcast 스텝이 공유하는 태그 문법의 반례 고정.
        # 태그를 밀어야만 검증되던 경로를 PR CI로 당긴다(v* 태그는 룰셋상 불변이라 재시도 불가).
        run: |
          scripts/check-release-version.sh --selftest
          # 문법이 맞는 것과 가드가 실제로 '불린다'는 것은 다른 명제다. 두 호출부가 떨어져 나가면
          # (인라인·삭제) 위 selftest는 계속 초록이고, 태그를 민 뒤에야 드러난다 — 그런데 v* 태그는
          # 불변이라 패치 범프로만 복구된다(RELEASING.md). 그 발견 시점을 PR로 당긴다.
          # rename은 이 파일이 같은 경로를 참조하므로 자동으로 잡힌다.
          grep -q 'check-release-version\.sh' scripts/release.sh \
            || { echo "::error::release.sh no longer calls check-release-version.sh"; exit 1; }
          grep -q 'check-release-version\.sh' .github/workflows/release.yml \
            || { echo "::error::release.yml appcast step no longer calls check-release-version.sh"; exit 1; }

      - name: Zsh script syntax
        # shellcheck는 zsh를 지원하지 않아 lint 잡이 release.sh·generate-project.sh를 건드리지 못한다.
        # zsh가 기본 셸인 이 macOS 잡에서 최소한 문법만이라도 잡는다(설치 0). bash 잡과 같은 이유로
        # 대상은 셔뱅으로 자동 탐색 — 하드코딩하면 새 zsh 스크립트가 조용히 빠진다.
        run: |
          files="$(grep -rl '^#!.*zsh' scripts || true)"
          [ -n "$files" ] || { echo "::error::zsh script discovery found nothing — the guard would check nothing"; exit 1; }
          echo "$files"
          echo "$files" | xargs -n1 zsh -n

      - name: Run MaraCore unit tests (with coverage)
        run: |
          cd MaraCore
          swift test --enable-code-coverage \
            -Xswiftc -warnings-as-errors

      - name: Coverage report & floor gate
        # 라인 커버리지를 Step Summary에 리포트하고 COVERAGE_MIN(기본 80%) 미만이면 실패.
        run: scripts/coverage.sh

      - name: Install XcodeGen (pinned, checksum-verified)
        # release.yml 과 동일 스크립트 — 이 PR CI 가 릴리스와 같은 설치 경로를 실증한다.
        run: scripts/install-xcodegen.sh

      - name: Generate Xcode project
        run: scripts/generate-project.sh

      - name: Build app (no code signing)
        run: |
          xcodebuild -project Mara.xcodeproj -scheme Mara \
            -configuration Debug -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO SWIFT_STRICT_CONCURRENCY=complete \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES build
