name: Dependency Watch

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sparkle:
    name: Sparkle version
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check latest stable Sparkle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/check-sparkle-version.sh --selftest
          scripts/check-sparkle-version.sh
